name: Hourly Autoresearch Loop

on:
  schedule:
    - cron: '0 * * * *'  # Runs at the top of every hour
  workflow_dispatch:      # Allows manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  run_quant_agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install pandas numpy requests python-dotenv pyarrow
        
    - name: Run Autoresearch Orchestrator (~50 min / ~10 iterations)
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        # Run for up to 50 minutes to maximise iterations per CI job (10x speedup vs 1 iteration)
        cd autoresearch
        timeout 3000 python run_autoresearch.py || true
        
    - name: Commit New Model Weights (If Found)
      continue-on-error: true
      run: |
        git config --global user.name "Autoresearch Quant Bot"
        git config --global user.email "bot@autoresearch.local"

        # Add files only if they exist
        [ -f autoresearch/experiment_logs.csv ] && git add autoresearch/experiment_logs.csv || true
        git add autoresearch/train.py
        [ -d autoresearch/saved_models ] && git add autoresearch/saved_models/ || true

        # Only commit and push if there are changes
        if ! git diff-index --quiet HEAD; then
          git pull --rebase origin main
          git commit -m "🤖 [Bot] Autonomous Quantitative Research Update"
          git push
        else
          echo "No improvements found this hour. Nothing to commit."
        fi
